<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学Ⅱ １学期中間考査対策γ</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Klee+One:wght@400;600&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4efe4;
  --paper: #fefcf5;
  --ink: #1a1408;
  --red: #b5251a;
  --blue: #1a4a8a;
  --green: #1a6a3a;
  --line: #c8bda0;
  --ruled: #ddd5be;
  --sh: rgba(26,20,8,0.12);
  --ok-bg: #eaf6ed; --ok-bd: #2e7d48;
  --ng-bg: #fdecea; --ng-bd: #c0392b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,var(--ruled) 27px,var(--ruled) 28px);
  min-height:100vh;font-family:'Klee One',cursive;color:var(--ink);padding:16px 12px 52px;
}

/* ── HEADER ── */
.hdr{max-width:800px;margin:0 auto 24px;background:var(--paper);border:2px solid var(--ink);border-radius:2px;box-shadow:4px 4px 0 var(--ink);padding:20px 24px 16px;position:relative}
.hdr::after{content:'';position:absolute;left:48px;top:0;bottom:0;width:1.5px;background:var(--red);opacity:.4}
.hdr-title{font-family:'Kaisei Decol',serif;font-size:clamp(16px,3.5vw,22px);font-weight:700;color:var(--red);padding-left:58px;line-height:1.4}
.hdr-sub{font-size:12px;color:#999;padding-left:58px;margin-top:4px}
.prog-row{display:flex;align-items:center;gap:10px;padding-left:58px;margin-top:12px}
.prog-out{flex:1;height:8px;background:var(--ruled);border-radius:99px;border:1px solid var(--line);overflow:hidden}
.prog-in{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:99px;transition:width .5s ease;width:0%}
.prog-txt{font-family:'Caveat',cursive;font-size:16px;min-width:70px;text-align:right;color:var(--ink)}

/* ── SECTION ── */
.sec{max-width:800px;margin:22px auto 10px;font-family:'Kaisei Decol',serif;font-size:14px;font-weight:700;color:var(--blue);padding:5px 14px;border-left:4px solid var(--blue);background:rgba(26,74,138,.06);border-radius:0 3px 3px 0;line-height:1.6}

/* ── CARD ── */
.card{max-width:800px;margin:0 auto 12px;background:var(--paper);border:1.5px solid var(--line);border-radius:2px;box-shadow:2px 2px 0 var(--sh);position:relative}
.card::before{content:'';position:absolute;left:48px;top:0;bottom:0;width:1px;background:var(--red);opacity:.28}
.card-in{display:flex;align-items:flex-start;padding:14px 18px 14px 0}
.qnum{min-width:48px;text-align:center;font-family:'Caveat',cursive;font-size:19px;font-weight:700;color:var(--blue);padding-top:2px;flex-shrink:0}
.qbody{flex:1}
.qtext{font-size:clamp(13px,2vw,15px);line-height:1.9;margin-bottom:12px}

/* ── MATH ── */
/* インライン数式 */
.mi{font-family:'Caveat',cursive;font-size:1.07em;letter-spacing:.01em}
/* 分数 */
.fr{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;font-family:'Caveat',cursive;line-height:1.15;margin:0 1px}
.fr .n{border-bottom:1.5px solid currentColor;padding:0 3px 1px;font-size:.88em}
.fr .d{padding:1px 3px 0;font-size:.88em}
/* 根号（√＋overline） */
.rt{display:inline-flex;align-items:flex-end;font-family:'Caveat',cursive;vertical-align:middle;line-height:1}
.rt-sym{font-size:1.12em;line-height:1;margin-right:-1px}
.rt-body{border-top:1.5px solid currentColor;padding:0 2px 0 1px;line-height:1.25;font-family:'Caveat',cursive}

/* ── CHOICES ── */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:2px}
@media(max-width:500px){.choices{grid-template-columns:1fr}}
.cbtn{background:var(--paper);border:1.5px solid var(--line);border-radius:3px;padding:9px 11px;font-family:'Klee One',cursive;font-size:clamp(12px,2vw,14px);color:var(--ink);cursor:pointer;text-align:left;line-height:1.7;display:flex;align-items:flex-start;gap:6px;box-shadow:1px 1px 0 var(--sh);transition:all .1s}
.cbtn:hover:not(:disabled){background:#fff9e6;border-color:var(--blue);transform:translateY(-1px)}
.clbl{font-family:'Caveat',cursive;font-size:18px;font-weight:700;color:var(--blue);flex-shrink:0;line-height:1.2}
.cbtn.ok{background:var(--ok-bg);border-color:var(--ok-bd);color:#1b5e20;box-shadow:1px 1px 0 var(--ok-bd)}
.cbtn.ng{background:var(--ng-bg);border-color:var(--ng-bd);color:#7f0000;box-shadow:1px 1px 0 var(--ng-bd)}
.cbtn:disabled{cursor:default;transform:none}

/* ── EXPLANATION ── */
.expbox{display:none;margin-top:10px;padding:9px 12px;border-radius:3px;font-size:13px;line-height:1.85;animation:fadeUp .25s ease}
.expbox.show{display:block}
.expbox.ok{background:var(--ok-bg);border:1px solid var(--ok-bd);color:#1b5e20}
.expbox.ng{background:var(--ng-bg);border:1px solid var(--ng-bd);color:#7f0000}
.exp-t{font-weight:600;font-family:'Kaisei Decol',serif;font-size:13px;margin-bottom:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── NEXT ── */
.nxt-wrap{text-align:right;margin-top:10px}
.nxt{display:none;background:var(--ink);color:#fff;border:none;border-radius:3px;padding:8px 20px;font-family:'Klee One',cursive;font-size:13px;cursor:pointer;box-shadow:2px 2px 0 var(--red);transition:all .12s}
.nxt:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--red)}
.nxt.show{display:inline-block}

/* ── BADGE ── */
.badge{position:fixed;top:12px;right:12px;background:var(--ink);color:#fff;font-family:'Caveat',cursive;font-size:16px;padding:5px 14px;border-radius:99px;box-shadow:2px 2px 0 var(--red);z-index:999}

/* ── RESULT ── */
.result{display:none;max-width:800px;margin:24px auto 0;background:var(--paper);border:2px solid var(--ink);border-radius:2px;box-shadow:5px 5px 0 var(--ink);padding:36px 28px;text-align:center}
.result.show{display:block;animation:fadeUp .4s ease}
.r-em{font-size:58px;margin-bottom:10px}
.r-hd{font-family:'Kaisei Decol',serif;font-size:20px;margin-bottom:16px}
.r-sc{font-family:'Caveat',cursive;font-size:80px;color:var(--red);line-height:1}
.r-dn{font-size:14px;color:#888;margin-bottom:20px}
.r-msg{font-size:15px;line-height:1.9;max-width:460px;margin:0 auto 26px;padding:13px 16px;background:#fff9e6;border:1px dashed var(--line);border-radius:3px}
.retry{background:var(--red);color:#fff;border:none;border-radius:3px;padding:11px 30px;font-family:'Klee One',cursive;font-size:15px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:all .12s}
.retry:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
</style>
</head>
<body>

<div class="badge" id="badge">0 / 0</div>

<div class="hdr">
  <div class="hdr-title">数学Ⅱ　１学期中間考査対策γ</div>
  <div class="hdr-sub">全44問・大問１〜10・１問ごとに解説つき ✏️</div>
  <div class="prog-row">
    <div class="prog-out"><div class="prog-in" id="pbar"></div></div>
    <div class="prog-txt" id="ptxt">0 / 44</div>
  </div>
</div>

<div id="root"></div>

<div class="result" id="result">
  <div class="r-em" id="rEm">🎉</div>
  <div class="r-hd">おつかれさまでした！</div>
  <div class="r-sc" id="rSc">0</div>
  <div class="r-dn">/ 44 問</div>
  <div class="r-msg" id="rMsg"></div>
  <button class="retry" onclick="appInit()">もう一度チャレンジ！</button>
</div>

<script>
/* =====================================================
   HTML helpers
===================================================== */
// 分数
function fr(n,d){return`<span class="fr"><span class="n">${n}</span><span class="d">${d}</span></span>`}
// 根号（√記号＋上線）
function rt(x){return`<span class="rt"><span class="rt-sym">√</span><span class="rt-body">${x}</span></span>`}
// インライン数式
function mi(x){return`<span class="mi">${x}</span>`}

/* =====================================================
   問題データ（44問）
===================================================== */
const SECTIONS=[

/* ━ 大問１ 展開 ━ */
{title:"１　次の式を展開せよ。",qs:[
{q:`${mi("(x＋3)³")} を展開せよ。`,
 cs:[{t:`${mi("x³＋9x²＋27x＋27")}`,ok:true},
     {t:`${mi("x³＋3x²＋9x＋27")}`,ok:false},
     {t:`${mi("x³＋9x²＋27x＋9")}`,ok:false},
     {t:`${mi("x³＋6x²＋12x＋8")}`,ok:false}],
 exp:`(a＋b)³＝a³＋3a²b＋3ab²＋b³ に a＝x、b＝3 を代入。<br>3a²b＝9x²、3ab²＝27x、b³＝27。答え：<b>x³＋9x²＋27x＋27</b>`},

{q:`${mi("(x－4)³")} を展開せよ。`,
 cs:[{t:`${mi("x³－12x²＋48x－64")}`,ok:true},
     {t:`${mi("x³＋12x²－48x＋64")}`,ok:false},
     {t:`${mi("x³－12x²＋48x＋64")}`,ok:false},
     {t:`${mi("x³－4x²＋16x－64")}`,ok:false}],
 exp:`(a－b)³＝a³－3a²b＋3ab²－b³ に b＝4。<br>符号に注意！答え：<b>x³－12x²＋48x－64</b>`},

{q:`${mi("(x＋2y)³")} を展開せよ。`,
 cs:[{t:`${mi("x³＋6x²y＋12xy²＋8y³")}`,ok:true},
     {t:`${mi("x³＋2x²y＋4xy²＋8y³")}`,ok:false},
     {t:`${mi("x³＋6x²y＋12xy²＋6y³")}`,ok:false},
     {t:`${mi("x³＋8x²y＋12xy²＋8y³")}`,ok:false}],
 exp:`b＝2y として展開。3a²b＝6x²y、3ab²＝12xy²、b³＝8y³。<br>答え：<b>x³＋6x²y＋12xy²＋8y³</b>`},

{q:`${mi("(x－3y)³")} を展開せよ。`,
 cs:[{t:`${mi("x³－9x²y＋27xy²－27y³")}`,ok:true},
     {t:`${mi("x³＋9x²y－27xy²＋27y³")}`,ok:false},
     {t:`${mi("x³－3x²y＋9xy²－27y³")}`,ok:false},
     {t:`${mi("x³－9x²y＋27xy²＋27y³")}`,ok:false}],
 exp:`b＝3y として (a－b)³ の公式。答え：<b>x³－9x²y＋27xy²－27y³</b>`},
]},

/* ━ 大問２ 因数分解 ━ */
{title:"２　次の式を因数分解せよ。",qs:[
{q:`${mi("x³＋125")} を因数分解せよ。`,
 cs:[{t:`${mi("(x＋5)(x²－5x＋25)")}`,ok:true},
     {t:`${mi("(x＋5)(x²＋5x＋25)")}`,ok:false},
     {t:`${mi("(x－5)(x²＋5x＋25)")}`,ok:false},
     {t:`${mi("(x＋5)³")}`,ok:false}],
 exp:`a³＋b³＝(a＋b)(a²－ab＋b²) に a＝x、b＝5。<br>中の符号は「－＋」！答え：<b>(x＋5)(x²－5x＋25)</b>`},

{q:`${mi("x³－y³")} を因数分解せよ。`,
 cs:[{t:`${mi("(x－y)(x²＋xy＋y²)")}`,ok:true},
     {t:`${mi("(x－y)(x²－xy＋y²)")}`,ok:false},
     {t:`${mi("(x＋y)(x²－xy＋y²)")}`,ok:false},
     {t:`${mi("(x－y)³")}`,ok:false}],
 exp:`a³－b³＝(a－b)(a²＋ab＋b²)。中の符号は「＋＋」！<br>答え：<b>(x－y)(x²＋xy＋y²)</b>`},

{q:`${mi("x³＋1000")} を因数分解せよ。`,
 cs:[{t:`${mi("(x＋10)(x²－10x＋100)")}`,ok:true},
     {t:`${mi("(x＋10)(x²＋10x＋100)")}`,ok:false},
     {t:`${mi("(x－10)(x²＋10x＋100)")}`,ok:false},
     {t:`${mi("(x＋10)³")}`,ok:false}],
 exp:`1000＝10³ なので b＝10 で a³＋b³ の公式。<br>答え：<b>(x＋10)(x²－10x＋100)</b>`},

{q:`${mi("8x³－1")} を因数分解せよ。`,
 cs:[{t:`${mi("(2x－1)(4x²＋2x＋1)")}`,ok:true},
     {t:`${mi("(2x＋1)(4x²－2x＋1)")}`,ok:false},
     {t:`${mi("(2x－1)(4x²－2x＋1)")}`,ok:false},
     {t:`${mi("(2x－1)³")}`,ok:false}],
 exp:`8x³＝(2x)³ なので a＝2x、b＝1 で a³－b³ の公式。<br>答え：<b>(2x－1)(4x²＋2x＋1)</b>`},
]},

/* ━ 大問３ 除法 ━ */
{title:"３　次の多項式 A, B について、A を B で割った商と余りを求めよ。",qs:[
{q:`${mi("A＝x²－2x－1")}、${mi("B＝x＋1")} のとき、商と余りは？`,
 cs:[{t:`商 ${mi("x－3")}、余り ${mi("2")}`,ok:true},
     {t:`商 ${mi("x＋3")}、余り ${mi("2")}`,ok:false},
     {t:`商 ${mi("x－3")}、余り ${mi("－2")}`,ok:false},
     {t:`商 ${mi("x－1")}、余り ${mi("0")}`,ok:false}],
 exp:`x²－2x－1 を x＋1 で割る。<br>x²÷x＝x → x(x＋1)を引いて－3x－1。<br>－3x÷x＝－3 → (－3)(x＋1)を引いて余り 2。<br>答え：<b>商 x－3、余り 2</b>`},

{q:`${mi("A＝x²＋5x＋5")}、${mi("B＝x＋2")} のとき、商と余りは？`,
 cs:[{t:`商 ${mi("x＋3")}、余り ${mi("－1")}`,ok:true},
     {t:`商 ${mi("x＋3")}、余り ${mi("1")}`,ok:false},
     {t:`商 ${mi("x－3")}、余り ${mi("－1")}`,ok:false},
     {t:`商 ${mi("x＋2")}、余り ${mi("0")}`,ok:false}],
 exp:`商 x＋3、(x＋2)(x＋3)＝x²＋5x＋6 を引いて余り－1。<br>答え：<b>商 x＋3、余り－1</b>`},

{q:`${mi("A＝2x²－3x＋1")}、${mi("B＝x－1")} のとき、商と余りは？`,
 cs:[{t:`商 ${mi("2x－1")}、余り ${mi("0")}`,ok:true},
     {t:`商 ${mi("2x＋1")}、余り ${mi("0")}`,ok:false},
     {t:`商 ${mi("2x－1")}、余り ${mi("2")}`,ok:false},
     {t:`商 ${mi("x－1")}、余り ${mi("0")}`,ok:false}],
 exp:`(x－1)(2x－1)＝2x²－3x＋1 なので割り切れる。<br>答え：<b>商 2x－1、余り 0</b>`},

{q:`${mi("A＝x³－2x²＋3x＋12")}、${mi("B＝x＋2")} のとき、商と余りは？`,
 cs:[{t:`商 ${mi("x²－4x＋11")}、余り ${mi("－10")}`,ok:true},
     {t:`商 ${mi("x²＋4x＋11")}、余り ${mi("10")}`,ok:false},
     {t:`商 ${mi("x²－4x＋11")}、余り ${mi("10")}`,ok:false},
     {t:`商 ${mi("x²－4x－11")}、余り ${mi("－10")}`,ok:false}],
 exp:`順に割ると商 x²－4x＋11、11(x＋2)＝11x＋22 を引いて余り－10。<br>答え：<b>商 x²－4x＋11、余り－10</b>`},
]},

/* ━ 大問４ 分数式の乗除 ━ */
{title:"４　次の計算をせよ。（分数式の乗除）",qs:[
{q:`${fr("x²","x＋2")} × ${fr("x＋2","x²－4x")} を計算せよ。`,
 cs:[{t:fr("x","x－4"),ok:true},
     {t:fr("x＋2","x－4"),ok:false},
     {t:fr("x","x＋4"),ok:false},
     {t:fr("1","x－4"),ok:false}],
 exp:`x²－4x＝x(x－4) に分解してから約分。<br>${fr("x²","x＋2")}×${fr("x＋2","x(x－4)")}＝<b>${fr("x","x－4")}</b>`},

{q:`${fr("x＋3","x²－x－6")} × ${fr("x²＋4x＋4","x²＋5x＋6")} を計算せよ。`,
 cs:[{t:fr("1","x－3"),ok:true},
     {t:fr("x＋2","x－3"),ok:false},
     {t:fr("1","x＋3"),ok:false},
     {t:fr("x＋2","x＋3"),ok:false}],
 exp:`各式を因数分解してから約分。<br>x²－x－6＝(x＋2)(x－3)、x²＋4x＋4＝(x＋2)²、x²＋5x＋6＝(x＋2)(x＋3)。<br>答え：<b>${fr("1","x－3")}</b>`},

{q:`${fr("x－3","x＋1")} ÷ ${fr("1","x²＋x")} を計算せよ。`,
 cs:[{t:`${mi("x(x－3)")}`,ok:true},
     {t:fr("x－3","x(x＋1)"),ok:false},
     {t:`${mi("(x－3)(x＋1)")}`,ok:false},
     {t:fr("x－3","x＋1"),ok:false}],
 exp:`÷${fr("1","x²＋x")} は ×(x²＋x) と同じ。x²＋x＝x(x＋1) なので<br>${fr("x－3","x＋1")}×x(x＋1)＝<b>x(x－3)</b>`},

{q:`${fr("x²－1","x²－3x＋2")} ÷ ${fr("x²＋x","x－4")} を計算せよ。`,
 cs:[{t:fr("x－4","x(x－2)"),ok:true},
     {t:fr("x＋1","x－2"),ok:false},
     {t:fr("x－4","x＋1"),ok:false},
     {t:fr("(x＋1)(x－4)","x(x－2)"),ok:false}],
 exp:`x²－1＝(x＋1)(x－1)、x²－3x＋2＝(x－1)(x－2)、x²＋x＝x(x＋1)。逆数をかけて約分。<br>答え：<b>${fr("x－4","x(x－2)")}</b>`},
]},

/* ━ 大問５ 分数式の加減 ━ */
{title:"５　次の計算をせよ。（分数式の加減）",qs:[
{q:`${fr("2","3x")} ＋ ${fr("5","3x")} を計算せよ。`,
 cs:[{t:fr("7","3x"),ok:true},
     {t:fr("7","6x"),ok:false},
     {t:fr("7","9x²"),ok:false},
     {t:fr("10","3x"),ok:false}],
 exp:`分母が同じなので分子を足す。2＋5＝7。答え：<b>${fr("7","3x")}</b>`},

{q:`${fr("4x＋1","3x－1")} － ${fr("2x","3x－1")} を計算せよ。`,
 cs:[{t:fr("2x＋1","3x－1"),ok:true},
     {t:fr("2x－1","3x－1"),ok:false},
     {t:fr("6x＋1","3x－1"),ok:false},
     {t:fr("2x＋1","6x－2"),ok:false}],
 exp:`分子：(4x＋1)－2x＝2x＋1。答え：<b>${fr("2x＋1","3x－1")}</b>`},

{q:`${fr("x＋1","x＋3")} ＋ ${fr("2x＋8","x＋3")} を計算せよ。`,
 cs:[{t:`3`,ok:true},
     {t:fr("3x＋9","x＋3"),ok:false},
     {t:fr("3","x＋3"),ok:false},
     {t:fr("3x＋9","(x＋3)²"),ok:false}],
 exp:`分子：(x＋1)＋(2x＋8)＝3x＋9＝3(x＋3)。<br>${fr("3(x＋3)","x＋3")}＝<b>3</b>　約分を忘れずに！`},

{q:`${fr("2x＋9","x－5")} － ${fr("－3x＋4","x－5")} を計算せよ。`,
 cs:[{t:fr("5x＋5","x－5"),ok:true},
     {t:fr("5x－5","x－5"),ok:false},
     {t:fr("－x＋13","x－5"),ok:false},
     {t:fr("5(x＋1)","x＋5"),ok:false}],
 exp:`分子：(2x＋9)－(－3x＋4)＝5x＋5。答え：<b>${fr("5x＋5","x－5")}</b>`},

/* =====================================================
   シャッフルロジック
   ・毎回 Fisher-Yates で完全ランダムにシャッフル
   ・正解位置を事前に「制約付きランダム」で決定
     → 直前2問と同じ位置にならないよう試行
===================================================== */
function fisherYates(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function makePositions(n){
  const pos=[];
  for(let i=0;i<n;i++){
    let p,tries=0;
    do{ p=Math.floor(Math.random()*4); tries++;
    }while(tries<30&&pos.length>=2&&pos[pos.length-1]===p&&pos[pos.length-2]===p);
    pos.push(p);
  }
  return pos;
}

function applyPosition(choices,targetPos){
  const arr=fisherYates(choices);
  const ci=arr.findIndex(c=>c.ok);
  if(ci!==targetPos)[arr[ci],arr[targetPos]]=[arr[targetPos],arr[ci]];
  return arr;
}

/* =====================================================
   アプリ本体
===================================================== */
const TOTAL=44;
const LBLS=['ア','イ','ウ','エ'];
let answered=[],correctCnt=0,positions=[];

function appInit(){
  positions=makePositions(TOTAL);
  answered=Array(TOTAL).fill(false);
  correctCnt=0;
  document.getElementById('result').classList.remove('show');
  document.getElementById('root').innerHTML='';
  buildDOM();
  updateUI();
}

function buildDOM(){
  const root=document.getElementById('root');
  let gi=0;
  SECTIONS.forEach(sec=>{
    const sh=document.createElement('div');
    sh.className='sec';sh.textContent=sec.title;root.appendChild(sh);
    sec.qs.forEach(q=>{root.appendChild(makeCard(q,gi));gi++;});
  });
}

function makeCard(q,gi){
  const shuffled=applyPosition(q.cs,positions[gi]);
  const card=document.createElement('div');
  card.className='card';card.id=`c${gi}`;
  const inner=document.createElement('div');inner.className='card-in';
  const num=document.createElement('div');num.className='qnum';num.textContent=`(${gi+1})`;
  inner.appendChild(num);
  const body=document.createElement('div');body.className='qbody';
  const qt=document.createElement('div');qt.className='qtext';qt.innerHTML=q.q;body.appendChild(qt);
  const cdiv=document.createElement('div');cdiv.className='choices';
  shuffled.forEach((ch,ci)=>{
    const btn=document.createElement('button');btn.className='cbtn';
    btn.innerHTML=`<span class="clbl">${LBLS[ci]}</span><span>${ch.t}</span>`;
    btn.onclick=()=>answer(gi,btn,ch.ok,shuffled,q.exp);
    cdiv.appendChild(btn);
  });
  body.appendChild(cdiv);
  const expDiv=document.createElement('div');expDiv.className='expbox';expDiv.id=`e${gi}`;body.appendChild(expDiv);
  const nw=document.createElement('div');nw.className='nxt-wrap';
  const nb=document.createElement('button');nb.className='nxt';nb.id=`n${gi}`;
  nb.textContent=gi<TOTAL-1?'次の問題へ →':'結果を見る 🎯';
  nb.onclick=()=>{
    const next=document.getElementById(`c${gi+1}`);
    if(next)next.scrollIntoView({behavior:'smooth',block:'center'});
    else showResult();
  };
  nw.appendChild(nb);body.appendChild(nw);
  inner.appendChild(body);card.appendChild(inner);
  return card;
}

function answer(gi,clickedBtn,isOk,shuffled,expHtml){
  if(answered[gi])return;
  answered[gi]=true;
  if(isOk)correctCnt++;
  document.getElementById(`c${gi}`).querySelectorAll('.cbtn').forEach((btn,i)=>{
    btn.disabled=true;
    if(shuffled[i].ok)btn.classList.add('ok');
  });
  if(!isOk)clickedBtn.classList.add('ng');
  const expDiv=document.getElementById(`e${gi}`);
  expDiv.innerHTML=`<div class="exp-t">${isOk?'✅ 正解！':'❌ 不正解…'}</div>${expHtml}`;
  expDiv.className=`expbox show ${isOk?'ok':'ng'}`;
  document.getElementById(`n${gi}`).classList.add('show');
  updateUI();
  if(answered.every(Boolean))setTimeout(showResult,500);
}

function updateUI(){
  const done=answered.filter(Boolean).length;
  document.getElementById('pbar').style.width=(done/TOTAL*100)+'%';
  document.getElementById('ptxt').textContent=`${done} / ${TOTAL}`;
  document.getElementById('badge').textContent=`${correctCnt} / ${done}`;
}

function showResult(){
  const pct=correctCnt/TOTAL;
  let em,msg;
  if(pct>=.9){em='🏆';msg='ほぼ満点！本番も自信を持って臨もう！';}
  else if(pct>=.7){em='😊';msg='よくできました！間違えた問題の解説を読んでさらに完璧に。';}
  else if(pct>=.5){em='🤔';msg='半分以上正解！解説を読んでもう一度チャレンジしてみよう。';}
  else{em='💪';msg='解説をじっくり読んで繰り返し解くのが上達の近道。くじけないで！';}
  document.getElementById('rEm').textContent=em;
  document.getElementById('rSc').textContent=correctCnt;
  document.getElementById('rMsg').textContent=msg;
  const r=document.getElementById('result');r.classList.add('show');
  r.scrollIntoView({behavior:'smooth',block:'center'});
}

appInit();
